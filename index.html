<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>资料与软件下载中心</title>

  <!-- Tailwind CSS CDN (不需要构建) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 可选：一些基础样式微调 -->
  <style>
    .line-clamp-2{
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <!-- 顶部栏 -->
  <header class="sticky top-0 z-10 backdrop-blur bg-white/80 border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center gap-4">
      <div class="flex items-center gap-3">
        <div class="h-10 w-10 rounded-xl bg-slate-900 text-white grid place-items-center font-bold">
          Co
        </div>
        <div>
          <div class="text-lg font-semibold leading-tight">资料与软件下载中心</div>
          <div class="text-sm text-slate-500 leading-tight">公开资源导航 · 外链下载</div>
        </div>
      </div>

      <div class="flex-1"></div>

      <div class="text-sm text-slate-500">
        <span id="lastUpdated">更新：—</span>
      </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 pb-4">
      <div class="flex flex-col md:flex-row gap-3 md:items-center">
        <div class="flex-1">
          <label class="block text-xs text-slate-500 mb-1">搜索（名称 / 描述 / 标签）</label>
          <input id="searchInput"
                 type="text"
                 placeholder="例如：驱动、客户端、说明书、Windows..."
                 class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 outline-none focus:ring-2 focus:ring-slate-400"/>
        </div>

        <div class="md:w-64">
          <label class="block text-xs text-slate-500 mb-1">分类</label>
          <select id="categorySelect"
                  class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 outline-none focus:ring-2 focus:ring-slate-400">
            <option value="__ALL__">全部分类</option>
          </select>
        </div>

        <div class="md:w-44">
          <label class="block text-xs text-slate-500 mb-1">平台</label>
          <select id="platformSelect"
                  class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 outline-none focus:ring-2 focus:ring-slate-400">
            <option value="__ALL__">全部平台</option>
          </select>
        </div>
      </div>

      <div class="mt-3 flex items-center justify-between gap-3 text-sm">
        <div class="text-slate-500">
          结果：<span id="resultCount">0</span>
        </div>
        <button id="resetBtn"
                class="rounded-xl border border-slate-300 bg-white px-4 py-2 hover:bg-slate-100 active:scale-[0.99]">
          重置筛选
        </button>
      </div>
    </div>
  </header>

  <!-- 主体 -->
  <main class="max-w-6xl mx-auto px-4 py-8">
    <!-- 提示区 -->
    <section class="mb-6">
      <div class="rounded-2xl border border-slate-200 bg-white p-5">
        <div class="font-semibold mb-1">说明</div>
        <ul class="list-disc pl-5 text-sm text-slate-600 space-y-1">
          <li>本页面仅提供下载导航链接，下载内容由第三方站点提供与维护。</li>
          <li>如链接失效或下载异常，请联系贵司对接人员或反馈给我们。</li>
          <li>建议下载后核对文件名/版本信息，必要时使用校验值（如对方提供）。</li>
        </ul>
      </div>
    </section>

    <!-- 内容渲染区 -->
    <section id="contentRoot" class="space-y-8"></section>

    <!-- 空状态 -->
    <section id="emptyState" class="hidden">
      <div class="rounded-2xl border border-slate-200 bg-white p-10 text-center text-slate-600">
        没有匹配的资源。请尝试调整搜索词或筛选条件。
      </div>
    </section>

    <!-- 页脚 -->
    <footer class="mt-10 py-8 text-sm text-slate-500">
      <div class="border-t border-slate-200 pt-6 flex flex-col md:flex-row md:items-center gap-2 justify-between">
        <div>© <span id="year"></span> Your Company. All rights reserved.</div>
        <div class="flex gap-3">
          <a class="hover:text-slate-800" href="#" onclick="return false;">隐私声明</a>
          <a class="hover:text-slate-800" href="#" onclick="return false;">联系我们</a>
        </div>
      </div>
    </footer>
  </main>

  <script>
    // ===== 工具函数 =====
    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeText(str) {
      return String(str ?? "").toLowerCase().trim();
    }

    function uniq(arr) {
      return Array.from(new Set(arr.filter(Boolean)));
    }

    // ===== 状态 =====
    let rawData = null;
    let allItems = []; // 展平成 item 列表（包含 category）
    let categories = [];
    let platforms = [];

    const els = {
      contentRoot: document.getElementById("contentRoot"),
      emptyState: document.getElementById("emptyState"),
      searchInput: document.getElementById("searchInput"),
      categorySelect: document.getElementById("categorySelect"),
      platformSelect: document.getElementById("platformSelect"),
      resultCount: document.getElementById("resultCount"),
      lastUpdated: document.getElementById("lastUpdated"),
      resetBtn: document.getElementById("resetBtn"),
      year: document.getElementById("year"),
    };

    els.year.textContent = String(new Date().getFullYear());

    // ===== 读取数据 =====
    async function loadData() {
      const resp = await fetch("./links.json", { cache: "no-store" });
      if (!resp.ok) throw new Error("无法加载 links.json");
      rawData = await resp.json();

      els.lastUpdated.textContent = "更新：" + (rawData.lastUpdated ?? "—");

      categories = (rawData.categories ?? []).map(c => c.name);
      platforms = uniq((rawData.categories ?? [])
        .flatMap(c => (c.items ?? []).map(i => i.platform)));

      // 展平
      allItems = (rawData.categories ?? []).flatMap(c => {
        const cname = c.name ?? "未分类";
        return (c.items ?? []).map(i => ({
          ...i,
          category: cname,
          tags: Array.isArray(i.tags) ? i.tags : []
        }));
      });

      buildFilters();
      render();
    }

    // ===== 构建筛选下拉 =====
    function buildFilters() {
      // 分类
      for (const c of categories) {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        els.categorySelect.appendChild(opt);
      }

      // 平台
      for (const p of platforms.sort((a,b)=>String(a).localeCompare(String(b)))) {
        const opt = document.createElement("option");
        opt.value = p;
        opt.textContent = p;
        els.platformSelect.appendChild(opt);
      }
    }

    // ===== 筛选与渲染 =====
    function getFilteredItems() {
      const q = normalizeText(els.searchInput.value);
      const cat = els.categorySelect.value;
      const plat = els.platformSelect.value;

      return allItems.filter(item => {
        if (cat !== "__ALL__" && item.category !== cat) return false;
        if (plat !== "__ALL__" && item.platform !== plat) return false;

        if (!q) return true;

        const hay = [
          item.name,
          item.desc,
          item.platform,
          item.category,
          ...(item.tags ?? [])
        ].map(normalizeText).join(" ");

        return hay.includes(q);
      });
    }

    function groupByCategory(items) {
      const map = new Map();
      for (const it of items) {
        const key = it.category ?? "未分类";
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(it);
      }
      return map;
    }

    function render() {
      const filtered = getFilteredItems();
      els.resultCount.textContent = String(filtered.length);

      els.contentRoot.innerHTML = "";
      els.emptyState.classList.toggle("hidden", filtered.length !== 0);

      if (filtered.length === 0) return;

      const grouped = groupByCategory(filtered);

      // 为了稳定输出顺序：优先使用 categories 列表顺序，其次未分类
      const orderedKeys = [
        ...categories.filter(c => grouped.has(c)),
        ...Array.from(grouped.keys()).filter(k => !categories.includes(k))
      ];

      for (const catName of orderedKeys) {
        const items = grouped.get(catName) ?? [];
        items.sort((a,b)=>String(a.name).localeCompare(String(b.name)));

        const section = document.createElement("section");
        section.className = "space-y-3";

        section.innerHTML = `
          <div class="flex items-end justify-between gap-4">
            <div>
              <h2 class="text-xl font-semibold">${escapeHtml(catName)}</h2>
              <div class="text-sm text-slate-500">共 ${items.length} 项</div>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" data-grid></div>
        `;

        const grid = section.querySelector("[data-grid]");

        for (const it of items) {
          const card = document.createElement("article");
          card.className = "rounded-2xl border border-slate-200 bg-white p-5 hover:shadow-sm transition";

          const tagsHtml = (it.tags ?? []).slice(0, 6).map(t => `
            <span class="text-xs rounded-full border border-slate-200 bg-slate-50 px-2 py-1">${escapeHtml(t)}</span>
          `).join("");

          const platformBadge = it.platform ? `
            <span class="text-xs rounded-full bg-slate-900 text-white px-2 py-1">${escapeHtml(it.platform)}</span>
          ` : "";

          const docBtn = it.docUrl ? `
            <a href="${escapeHtml(it.docUrl)}" target="_blank" rel="noopener noreferrer"
               class="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm hover:bg-slate-100">
              文档
            </a>
          ` : "";

          const note = it.note ? `
            <div class="mt-3 text-xs text-slate-500">备注：${escapeHtml(it.note)}</div>
          ` : "";

          card.innerHTML = `
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0">
                <div class="font-semibold text-base truncate">${escapeHtml(it.name)}</div>
                <div class="text-sm text-slate-600 mt-1 line-clamp-2">${escapeHtml(it.desc)}</div>
              </div>
              <div class="shrink-0">${platformBadge}</div>
            </div>

            <div class="mt-3 flex flex-wrap gap-2">${tagsHtml}</div>

            ${note}

            <div class="mt-4 flex items-center gap-2">
              <a href="${escapeHtml(it.url)}" target="_blank" rel="noopener noreferrer"
                 class="rounded-xl bg-slate-900 text-white px-3 py-2 text-sm hover:opacity-90">
                下载
              </a>
              ${docBtn}
              <a href="${escapeHtml(it.url)}" target="_blank" rel="noopener noreferrer"
                 class="text-sm text-slate-500 hover:text-slate-900 ml-auto">
                打开第三方链接 →
              </a>
            </div>
          `;

          grid.appendChild(card);
        }

        els.contentRoot.appendChild(section);
      }
    }

    // ===== 事件绑定 =====
    function bindEvents() {
      els.searchInput.addEventListener("input", () => render());
      els.categorySelect.addEventListener("change", () => render());
      els.platformSelect.addEventListener("change", () => render());

      els.resetBtn.addEventListener("click", () => {
        els.searchInput.value = "";
        els.categorySelect.value = "__ALL__";
        els.platformSelect.value = "__ALL__";
        render();
      });
    }

    // ===== 启动 =====
    (async function boot() {
      bindEvents();
      try {
        await loadData();
      } catch (e) {
        els.contentRoot.innerHTML = `
          <div class="rounded-2xl border border-red-200 bg-white p-6 text-red-700">
            <div class="font-semibold mb-2">加载失败</div>
            <div class="text-sm">请确认 links.json 与 index.html 在同一目录，且 JSON 格式正确。</div>
            <pre class="mt-3 text-xs text-red-800 whitespace-pre-wrap">${escapeHtml(e?.message)}</pre>
          </div>
        `;
      }
    })();
  </script>
</body>
</html>
